name: Publish to Kaggle
on:
  push:
    paths:
      - 'data/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Kaggle CLI
        run: pip install kaggle

      - name: Verify credentials
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          echo "Username length: ${#KAGGLE_USERNAME}"
          echo "Key length: ${#KAGGLE_KEY}"
          echo "Username set: $(if [ -n \"$KAGGLE_USERNAME\" ]; then echo YES; else echo NO; fi)"
          echo "Key set: $(if [ -n \"$KAGGLE_KEY\" ]; then echo YES; else echo NO; fi)"
          mkdir -p ~/.kaggle
          echo '{"username":"'"$KAGGLE_USERNAME"'","key":"'"$KAGGLE_KEY"'"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          echo "Kaggle config written to ~/.kaggle/kaggle.json"
          echo "Testing auth..."
          kaggle datasets list -s test --max-size 1 && echo "AUTH OK" || echo "AUTH FAILED"

      - name: Prepare dataset
        run: |
          mkdir -p kaggle_upload
          cp data/cloud-pricing.json kaggle_upload/
          cp data/gpu-specs.json kaggle_upload/
          cp kaggle/dataset-metadata.json kaggle_upload/
          echo "Files in kaggle_upload:"
          ls -la kaggle_upload/
          echo "Metadata contents:"
          cat kaggle_upload/dataset-metadata.json

      - name: Upload to Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"'"$KAGGLE_USERNAME"'","key":"'"$KAGGLE_KEY"'"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          echo "Attempting dataset create..."
          kaggle datasets create -p kaggle_upload -u 2>&1 || true
          echo "---"
          echo "Checking dataset status..."
          kaggle datasets status alphaoneindex/ai-infra-index 2>&1 || true
