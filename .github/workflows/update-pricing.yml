name: Update GPU Pricing Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-pricing:
    name: Fetch and Update GPU Cloud Pricing
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run pricing fetcher
        run: python scripts/fetch_pricing.py
        env:
          PYTHONUNBUFFERED: '1'

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/cloud-pricing.json data/history/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "chore: auto-update cloud pricing data [${TIMESTAMP}]"
            git push
            echo "Changes committed and pushed"
          fi
